<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search LightCart products with smart suggestions and filters.">
  <title>Search | LightCart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header"></header>
  <main class="page">
    <section class="search-hero glass reveal">
      <p class="eyebrow">Smart discovery</p>
      <h1>Search LightCart</h1>
      <form class="big-search" id="smartSearch">
        <input type="search" id="smartSearchInput" placeholder="Try wireless, lamp, bag, gaming..." aria-label="Search products">
        <button class="button primary">Search</button>
      </form>
      <div class="chips" data-search-suggestions></div>
    </section>
    <section class="shop-layout">
      <aside class="filters glass reveal">
        <h2>Search filters</h2>
        <label>Category<select id="categoryFilter"><option value="all">All categories</option></select></label>
        <label>Sort<select id="sortProducts"><option value="featured">Featured</option><option value="low">Price low to high</option><option value="rating">Top rated</option></select></label>
      </aside>
      <section class="catalog reveal">
        <div class="section-heading"><h2>Results</h2></div>
        <div class="product-grid" id="productsGrid"></div>
      </section>
    </section>
  </main>
  <footer class="site-footer"></footer>
  <button class="back-top" aria-label="Back to top">^</button>
  <button class="chat-fab" aria-label="Open chat support">Chat</button>
  <div class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
