<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="LightCart product details with gallery, zoom, specifications, ratings, reviews, related products, and frequently bought together.">
  <title>Product Details | LightCart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header"></header>
  <main class="page">
    <section class="product-detail reveal" id="productDetail"></section>
    <section class="section reveal">
      <div class="section-heading"><h2>Frequently Bought Together</h2></div>
      <div class="bundle glass" data-bundle></div>
    </section>
    <section class="section reveal">
      <div class="section-heading"><h2>Related Products</h2></div>
      <div class="carousel" data-product-section="related"></div>
    </section>
  </main>
  <footer class="site-footer"></footer>
  <button class="back-top" aria-label="Back to top">^</button>
  <button class="chat-fab" aria-label="Open chat support">Chat</button>
  <div class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
