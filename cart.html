<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Review your LightCart shopping cart with quantity controls, discounts, and estimated total.">
  <title>Cart | LightCart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header"></header>
  <main class="page">
    <section class="page-hero reveal"><p class="eyebrow">Checkout ready</p><h1>Your Cart</h1><p>Adjust quantities, remove items, and review savings.</p></section>
    <section class="cart-layout reveal">
      <div class="cart-items" id="cartItems"></div>
      <aside class="cart-summary glass" id="cartSummary"></aside>
    </section>
  </main>
  <footer class="site-footer"></footer>
  <button class="back-top" aria-label="Back to top">^</button>
  <button class="chat-fab" aria-label="Open chat support">Chat</button>
  <div class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
