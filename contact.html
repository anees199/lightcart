<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact LightCart support for orders, sellers, partnerships, and marketplace help.">
  <title>Contact | LightCart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header"></header>
  <main class="page">
    <section class="page-hero reveal"><p class="eyebrow">We are here</p><h1>Contact Us</h1><p>Fast support for shoppers, sellers, and brand partners.</p></section>
    <section class="contact-grid reveal">
      <form class="contact-form glass" data-contact>
        <label>Name<input required type="text" placeholder="Your name"></label>
        <label>Email<input required type="email" placeholder="you@example.com"></label>
        <label>Topic<select><option>Order help</option><option>Seller support</option><option>Partnership</option></select></label>
        <label>Message<textarea required placeholder="How can we help?"></textarea></label>
        <button class="button primary">Send Message</button>
      </form>
      <div class="content-band">
        <h2>Support channels</h2>
        <p>Email: support@lightcart.example</p>
        <p>Phone: +1 555 0199</p>
        <p>Hours: 24/7 marketplace assistance</p>
      </div>
    </section>
  </main>
  <footer class="site-footer"></footer>
  <button class="back-top" aria-label="Back to top">^</button>
  <button class="chat-fab" aria-label="Open chat support">Chat</button>
  <div class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
