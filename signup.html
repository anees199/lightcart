<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Create a LightCart account to save wishlist items, manage your cart, and checkout.">
  <title>Signup | LightCart</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header"></header>
  <main class="page">
    <section class="page-hero reveal"><p class="eyebrow">Create account</p><h1>Signup</h1><p>Save favorites, keep your cart synced, and checkout securely.</p></section>
    <section class="contact-grid reveal">
      <form class="contact-form glass" id="signupForm">
        <label>Username<input required minlength="3" maxlength="40" pattern="[A-Za-z0-9_]+" name="username" type="text" placeholder="lightcart_user"></label>
        <label>Email<input required name="email" type="email" placeholder="you@example.com"></label>
        <label>Password<input required minlength="8" name="password" type="password" placeholder="At least 8 characters"></label>
        <button class="button primary" type="submit">Create Account</button>
      </form>
      <div class="content-band">
        <h2>Already shopping?</h2>
        <p>Log in to access your cart, wishlist, and orders.</p>
        <a class="button ghost" href="login.html">Login</a>
      </div>
    </section>
  </main>
  <footer class="site-footer"></footer>
  <button class="back-top" aria-label="Back to top">^</button>
  <button class="chat-fab" aria-label="Open chat support">Chat</button>
  <div class="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
